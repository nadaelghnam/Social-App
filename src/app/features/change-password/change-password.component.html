<div class="max-w-md mx-auto mt-16 p-8 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 font-sans transition-all hover:shadow-md animate-in fade-in slide-in-from-bottom-4 duration-500">

  <div class="flex items-center gap-4 mb-10">
    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 shadow-sm">
      <i class="fa-solid fa-shield-halved text-xl"></i>
    </div>
    <div>
      <h2 class="text-xl font-black text-slate-900 tracking-tight">Security Settings</h2>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Update your password</p>
    </div>
  </div>

  <form [formGroup]="passwordForm" (ngSubmit)="submitPassword()" class="space-y-6">

    <div class="space-y-2">
      <label class="block text-[13px] font-black text-slate-700 ml-1">Current Password</label>
      <div class="relative group">
        <input
          [type]="isCurrentPasswordVisible ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••"
          class="w-full p-4 bg-slate-50 border border-transparent rounded-[1.2rem] focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-200 outline-none transition-all pr-12 text-sm font-medium text-slate-800 placeholder-slate-300">

        <span class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-300 hover:text-blue-600 transition-colors"
              (click)="isCurrentPasswordVisible = !isCurrentPasswordVisible">
          <i class="fa-solid" [class.fa-eye]="isCurrentPasswordVisible" [class.fa-eye-slash]="!isCurrentPasswordVisible"></i>
        </span>
      </div>
    </div>

    <div class="py-2">
        <div class="h-px bg-gradient-to-r from-transparent via-slate-100 to-transparent"></div>
    </div>

    <div class="space-y-2">
      <label class="block text-[13px] font-black text-slate-700 ml-1">New Password</label>
      <div class="relative group">
        <input
          [type]="isNewPasswordVisible ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="Create a strong password"
          class="w-full p-4 bg-slate-50 border border-transparent rounded-[1.2rem] focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-200 outline-none transition-all pr-12 text-sm font-medium text-slate-800 placeholder-slate-300">

        <span class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-300 hover:text-blue-600 transition-colors"
              (click)="isNewPasswordVisible = !isNewPasswordVisible">
          <i class="fa-solid" [class.fa-eye]="isNewPasswordVisible" [class.fa-eye-slash]="!isNewPasswordVisible"></i>
        </span>
      </div>

      @if (passwordForm.get('newPassword')?.touched && passwordForm.get('newPassword')?.hasError('pattern')) {
        <div class="bg-blue-50/50 border border-blue-100 text-blue-700 p-4 rounded-2xl mt-3 animate-in zoom-in-95">
          <div class="flex gap-3">
            <i class="fa-solid fa-circle-info mt-0.5 text-blue-500"></i>
            <div class="text-[11px] leading-relaxed">
              <strong class="block mb-1 font-black uppercase tracking-wider">Security Requirement:</strong>
              8+ characters, include Uppercase, Lowercase, Number, and Special character (#?!@$%^&*-).
            </div>
          </div>
        </div>
      }
    </div>

    <div class="space-y-2">
      <label class="block text-[13px] font-black text-slate-700 ml-1">Confirm New Password</label>
      <div class="relative group">
        <input
          [type]="isConfirmPasswordVisible ? 'text' : 'password'"
          formControlName="rePassword"
          placeholder="Repeat your new password"
          class="w-full p-4 bg-slate-50 border border-transparent rounded-[1.2rem] focus:bg-white focus:ring-4 focus:ring-blue-50 focus:border-blue-200 outline-none transition-all pr-12 text-sm font-medium text-slate-800 placeholder-slate-300">

        <span class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer text-slate-300 hover:text-blue-600 transition-colors"
              (click)="isConfirmPasswordVisible = !isConfirmPasswordVisible">
          <i class="fa-solid" [class.fa-eye]="isConfirmPasswordVisible" [class.fa-eye-slash]="!isConfirmPasswordVisible"></i>
        </span>
      </div>
    </div>

    <button type="submit"
            [disabled]="isLoading || passwordForm.invalid"
            class="w-full bg-blue-600 text-white font-black text-sm py-4 rounded-[1.2rem] hover:bg-blue-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center shadow-xl shadow-blue-100 mt-4 active:scale-[0.98]">
      @if(isLoading) {
        <div class="flex items-center gap-3">
            <span class="animate-spin border-2 border-white border-t-transparent rounded-full h-4 w-4"></span>
            <span>UPDATING SECURELY...</span>
        </div>
      } @else {
        UPDATE PASSWORD
      }
    </button>
  </form>
</div>
