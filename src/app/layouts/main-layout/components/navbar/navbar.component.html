<nav class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-slate-100 font-sans">
  <div class="max-w-screen-2xl flex items-center justify-between px-6 md:px-16 mx-auto h-20">

    <a routerLink="/feed" (click)="closeMenu()" class="flex items-center gap-3 group cursor-pointer">
      <div class="w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 transition-transform group-hover:scale-110">
        <img src="/assets/imgs/route.png" class="rounded-2xl" alt="Route Logo" />
      </div>
      <span class="text-xl font-black text-slate-800 tracking-tighter">Route<span class="text-blue-600">Posts</span></span>
    </a>

    <div [class.hidden]="!isMenuOpen"
         class="absolute top-20 left-0 w-full bg-white border-b border-slate-100 p-4 md:static md:block md:w-auto md:border-none md:p-0 md:bg-transparent animate-in fade-in slide-in-from-top-5 md:animate-none">
      <ul class="flex flex-col md:flex-row items-center gap-1 bg-slate-50 md:bg-slate-100/50 p-2 md:p-1.5 rounded-[1.5rem] border border-slate-100 md:border-slate-50">
        <li class="w-full md:w-auto">
          <a routerLink="/feed" routerLinkActive="bg-white text-blue-600 shadow-sm" (click)="closeMenu()"
            class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 transition-all">
            <i class="fa-solid fa-house-chimney text-base"></i>
            Feed
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/profile" routerLinkActive="bg-white text-blue-600 shadow-sm" (click)="closeMenu()"
            class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 transition-all">
            <i class="fa-regular fa-user text-base"></i>
            Profile
          </a>
        </li>
        <li class="w-full md:w-auto">
          <a routerLink="/notification" routerLinkActive="bg-white text-blue-600 shadow-sm" (click)="closeMenu()"
            class="flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 transition-all">
            <i class="fa-regular fa-bell text-base"></i>
            Notifications
          </a>
        </li>
      </ul>
    </div>

    <div class="flex items-center gap-2 md:gap-4 md:order-2">
      <div class="relative group">
        <button type="button"
          class="flex items-center gap-3 p-1.5 pe-3 rounded-[1.2rem] hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100"
          id="user-menu-button">
          <div class="relative">
            <img class="w-9 h-9 rounded-xl object-cover ring-2 ring-blue-50" src="/assets/imgs/default-profile.png" alt="user photo">
            <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full"></div>
          </div>
          <div class="hidden lg:block text-left leading-tight">
            <p class="text-[13px] font-black text-slate-800 mb-0.5">nadaahmed</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Verified Account</p>
          </div>
          <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ms-1 transition-transform group-hover:rotate-180"></i>
        </button>

        <div class="z-50 hidden group-hover:block absolute right-0 mt-2 bg-white border border-slate-100 rounded-[1.5rem] shadow-2xl w-56 p-2 animate-in fade-in slide-in-from-top-2">
          <div class="px-4 py-3 mb-2 bg-slate-50 rounded-2xl">
            <p class="text-xs font-bold text-slate-400 uppercase">Signed in as</p>
            <p class="text-sm font-black text-slate-800 truncate">nadaahmed@route.com</p>
          </div>
          <ul class="space-y-1">
            <li>
              <a routerLink="/profile" (click)="closeMenu()" class="flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">
                <i class="fa-regular fa-circle-user"></i> My Profile
              </a>
            </li>
            <li>
              <a routerLink="/changepassword" (click)="closeMenu()" class="flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-blue-50 hover:text-blue-600 rounded-xl transition-all">
                <i class="fa-solid fa-sliders"></i> Settings
              </a>
            </li>
            <li class="pt-2 mt-2 border-t border-slate-50">
              <button (click)="logOut()" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
              </button>
            </li>
          </ul>
        </div>
      </div>

      <button (click)="toggleMenu()" class="md:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 transition-colors">
        <i [class]="isMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"></i>
      </button>
    </div>
  </div>
</nav>
